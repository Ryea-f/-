<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>口算赛车 | 多模式简便计算对战</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
    }

    body {
        font-family: 'Segoe UI', 'Poppins', 'Comic Neue', system-ui, -apple-system, sans-serif;
        background: linear-gradient(145deg, #2b2b2b 0%, #1f1f2e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        margin: 0;
    }

    .game-container {
        max-width: 1600px;
        width: 100%;
        background: #fff9ef;
        border-radius: 48px;
        box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.6);
        padding: 20px 24px 30px;
        transition: all 0.2s;
    }

    .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        background: #ffefcf;
        padding: 12px 20px;
        border-radius: 60px;
        margin-bottom: 24px;
        box-shadow: inset 0 0 0 2px white, 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .control-group {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #fff2df;
        padding: 5px 18px;
        border-radius: 48px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .control-group label {
        font-weight: bold;
        color: #b13e3e;
        text-shadow: 0 1px 0 #ffdd99;
        font-size: 1rem;
    }

    select, button {
        background: #ffd966;
        border: none;
        padding: 6px 16px;
        border-radius: 40px;
        font-weight: bold;
        font-size: 0.95rem;
        cursor: pointer;
        transition: 0.1s linear;
        box-shadow: 0 3px 0 #b1622c;
        font-family: inherit;
    }

    select:active, button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #b1622c;
    }

    button {
        background: #ff8c42;
        color: white;
        letter-spacing: 1px;
    }

    button:active {
        background: #e0762c;
    }

    .racetrack-area {
        width: 100%;
        margin-bottom: 8px;
    }

    .track-grid {
        display: flex;
        flex-wrap: nowrap;
        gap: 16px;
        width: 100%;
    }

    .track-card {
        flex: 1 1 0;
        min-width: 210px;
        background: #fef5e3;
        border-radius: 40px;
        padding: 12px 10px 16px;
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255,255,200,0.8);
        transition: all 0.2s;
        border: 1px solid #ffdd99;
    }

    @media (max-width: 1300px) {
        .track-card {
            min-width: 190px;
            padding: 10px 8px 14px;
        }
        .control-group label {
            font-size: 0.9rem;
        }
    }

    @media (max-width: 1100px) {
        .track-card {
            min-width: 180px;
            padding: 8px 6px 12px;
        }
        .player-info {
            padding: 6px 8px;
        }
        .question-area {
            font-size: 1rem;
            padding: 8px 4px;
        }
    }

    .track-vertical {
        position: relative;
        height: 200px;
        background: repeating-linear-gradient(45deg, #fff 0px, #fff 20px, #111 20px, #111 40px);
        border-radius: 50px;
        margin-bottom: 10px;
        overflow: hidden;
        border: 3px solid #d4a373;
        box-shadow: inset 0 0 0 4px #ffe1a0, 0 5px 8px rgba(0,0,0,0.2);
    }

    .car-icon {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) rotate(90deg);
        font-size: 34px;
        transition: bottom 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        z-index: 10;
        display: inline-block;
        width: 44px;
        text-align: center;
    }

    .player-info {
        background: #ffe7bf;
        border-radius: 30px;
        padding: 6px 10px;
        margin: 6px 0;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 4px;
        font-weight: bold;
    }

    .player-name {
        background: #ffb347;
        padding: 2px 10px;
        border-radius: 30px;
        color: white;
        font-size: 0.8rem;
    }

    .score-time {
        display: flex;
        gap: 8px;
        background: #f0dbb4;
        padding: 2px 10px;
        border-radius: 30px;
        font-size: 0.8rem;
    }

    .score {
        color: #c7362b;
    }

    .timer {
        color: #2d6a4f;
        font-family: monospace;
        font-size: 0.9rem;
    }

    .question-area {
        background: #fffaee;
        border-radius: 36px;
        padding: 8px 5px;
        margin: 8px 0;
        text-align: center;
        font-size: 1rem;
        font-weight: bold;
        box-shadow: inset 0 1px 4px #ffe0aa, 0 3px 5px rgba(0,0,0,0.05);
        word-break: break-word;
        color: #433422;
    }

    .input-panel {
        background: #eeddbb;
        border-radius: 28px;
        padding: 6px;
        margin-top: 6px;
    }

    .answer-input {
        background: white;
        border-radius: 24px;
        padding: 4px 6px;
        text-align: center;
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 8px;
        border: 2px solid #ffaa55;
        letter-spacing: 2px;
        color: #2c3e2f;
        min-height: 40px;
    }

    .numpad {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 6px;
    }

    .numpad button {
        background: #ffdd99;
        color: #4e2e1a;
        box-shadow: 0 2px 0 #b97f3a;
        padding: 6px 0;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 36px;
    }

    .numpad button:active {
        transform: translateY(2px);
    }

    .action-btns {
        display: flex;
        gap: 10px;
        margin-top: 6px;
    }

    .action-btns button {
        flex: 1;
        background: #ffaa55;
        color: #2d2b1f;
        font-size: 0.9rem;
        padding: 6px 0;
    }

    .submit-btn {
        background: #3b9e3b !important;
        color: white !important;
        box-shadow: 0 2px 0 #1c5a1c;
    }

    .ranking-board {
        margin-top: 20px;
        background: #332211dd;
        backdrop-filter: blur(8px);
        border-radius: 50px;
        padding: 10px 16px;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        color: #fff3cf;
        font-weight: bold;
        transition: all 0.3s;
        font-size: 0.9rem;
        text-align: center;
    }

    .error-toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #dc2f02;
        color: white;
        padding: 6px 20px;
        border-radius: 40px;
        font-weight: bold;
        z-index: 200;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
    }

    .finished-flag {
        background: #5cb85c;
        color: white;
        border-radius: 30px;
        font-size: 0.65rem;
        padding: 2px 6px;
        display: inline-block;
    }

    .hint-icon {
        font-size: 0.75rem;
        margin-left: 4px;
        display: inline-block;
        animation: pulse 1s infinite;
    }
    @keyframes pulse {
        0% { opacity: 0.6; transform: scale(0.95);}
        100% { opacity: 1; transform: scale(1);}
    }
</style>
</head>
<body>
<div class="game-container">
    <div class="controls">
        <div class="control-group">
            <label>🧮 模式</label>
            <select id="modeSelect">
                <option value="add">三数加法简便</option>
                <option value="mul">三数乘法简便</option>
                <option value="distribute">乘法分配律</option>
                <option value="mix">综合模式</option>
            </select>
        </div>
        <div class="control-group">
            <label>🏁 组数</label>
            <select id="groupCountSelect">
                <option value="2">2 组</option>
                <option value="3" selected>3 组</option>
                <option value="4">4 组</option>
                <option value="5">5 组</option>
                <option value="6">6 组</option>
            </select>
        </div>
        <div class="control-group">
            <label>⭐ 满分</label>
            <select id="maxScoreSelect">
                <option value="5">5 分</option>
                <option value="10" selected>10 分</option>
                <option value="15">15 分</option>
            </select>
        </div>
        <div class="control-group">
            <button id="startGameBtn">🚦 开始对战</button>
        </div>
    </div>
    <div class="racetrack-area">
        <div class="track-grid" id="trackGrid"></div>
    </div>
    <div class="ranking-board" id="rankingBoard">🏆 等待比赛开始 🏆</div>
</div>
<div class="error-toast" id="errorToast">❌ 答案错误，再试试！</div>

<script>
    let gameActive = false;
    let gameStartTimestamp = null;
    let timerInterval = null;
    let groupsData = [];
    let maxScore = 10;
    let groupCount = 3;
    let currentMode = "add";

    const trackGrid = document.getElementById('trackGrid');
    const startBtn = document.getElementById('startGameBtn');
    const groupSelect = document.getElementById('groupCountSelect');
    const maxScoreSelect = document.getElementById('maxScoreSelect');
    const modeSelect = document.getElementById('modeSelect');
    const errorToast = document.getElementById('errorToast');

    function showErrorMsg() {
        errorToast.style.opacity = '1';
        setTimeout(() => {
            errorToast.style.opacity = '0';
        }, 800);
    }

    // 加法随机括号
    function buildBracketExpression(a, b, c) {
        const forms = [
            `${a} + ${b} + ${c}`,
            `(${a} + ${b}) + ${c}`,
            `${a} + (${b} + ${c})`,
            `(${a} + ${c}) + ${b}`,
            `${a} + ${b} + ${c}`,
            `(${a} + ${b} + ${c})`
        ];
        return forms[Math.floor(Math.random() * forms.length)];
    }

    // 1. 加法简便
    function generateAdd() {
        while (true) {
            const a = Math.floor(Math.random() * 90) + 10;
            const b = Math.floor(Math.random() * 90) + 10;
            const c = Math.floor(Math.random() * 90) + 10;
            if ((a + b) % 10 === 0 || (a + c) % 10 === 0 || (b + c) % 10 === 0) {
                return { expression: buildBracketExpression(a, b, c), answer: a + b + c };
            }
        }
    }

    // 2. 三数乘法简便
    function generateMul() {
        const bases = [[2,5],[4,25],[8,125]];
        const [x,y] = bases[Math.floor(Math.random()*bases.length)];
        const z = Math.floor(Math.random()*20)+1;
        const exprs = [
            `${x} × ${y} × ${z}`,
            `(${x} × ${y}) × ${z}`,
            `${x} × (${y} × ${z})`
        ];
        return { expression: exprs[Math.floor(Math.random()*exprs.length)], answer: x*y*z };
    }

    // 3. 终极乘法分配律（全凑整、口算秒算）
    function generateDistribute() {
        const easyC = [2,5,10,20,25,50];
        const c = easyC[Math.floor(Math.random()*easyC.length)];
        const type = Math.floor(Math.random() * 7);

        // 类型1：(a+b)×c，a×c、b×c凑整
        if(type === 0){
            const nums = [10,20,25,40,50,80];
            const a = nums[Math.floor(Math.random()*nums.length)];
            const b = nums[Math.floor(Math.random()*nums.length)];
            const exprs = [`(${a}+${b})×${c}`, `${c}×(${a}+${b})`];
            return {expression: exprs[Math.floor(Math.random()*2)], answer: (a+b)*c};
        }

        // 类型2：(a−b)×c，a×c、b×c凑整
        if(type === 1){
            const arr = [20,25,40,50,80,100];
            let a,b;
            do{a=arr[Math.floor(Math.random()*arr.length)];b=arr[Math.floor(Math.random()*arr.length)];}while(a<=b);
            const exprs = [`(${a}-${b})×${c}`, `${c}×(${a}-${b})`];
            return {expression: exprs[Math.floor(Math.random()*2)], answer: (a-b)*c};
        }

        // 类型3：a×c + b×c，a+b凑整
        if(type === 2){
            const pairs = [[17,83],[26,74],[35,65],[49,51],[72,28]];
            const [a,b] = pairs[Math.floor(Math.random()*pairs.length)];
            return {expression: `${a}×${c} + ${b}×${c}`, answer: (a+b)*c};
        }

        // 类型4：a×c − b×c，a−b凑整
        if(type === 3){
            const pairs = [[93,23],[85,35],[77,17],[64,14],[58,8]];
            const [a,b] = pairs[Math.floor(Math.random()*pairs.length)];
            return {expression: `${a}×${c} - ${b}×${c}`, answer: (a-b)*c};
        }

        // 类型5：a + a×99
        if(type === 4){
            const a = [5,8,10,15,20,25][Math.floor(Math.random()*6)];
            return {expression: `${a} + ${a}×99`, answer: a*100};
        }

        // 类型6：a×99 + a
        if(type === 5){
            const a = [6,9,12,15,24][Math.floor(Math.random()*5)];
            return {expression: `${a}×99 + ${a}`, answer: a*100};
        }

        // 类型7：a×101 − a
        const a = [7,11,18,22][Math.floor(Math.random()*4)];
        return {expression: `${a}×101 - ${a}`, answer: a*100};
    }

    // 总出题入口
    function generateProblem() {
        const mode = currentMode;
        if (mode === "add") return generateAdd();
        if (mode === "mul") return generateMul();
        if (mode === "distribute") return generateDistribute();
        if (mode === "mix") {
            const r = Math.random();
            if (r < 0.33) return generateAdd();
            if (r < 0.66) return generateMul();
            return generateDistribute();
        }
        return generateAdd();
    }

    function updateGroupUI(groupId) {
        const group = groupsData[groupId];
        if (!group) return;
        const card = document.getElementById(`track-${groupId}`);
        if (!card) return;

        const scoreSpan = card.querySelector('.score-value');
        if (scoreSpan) scoreSpan.innerText = `${group.score}/${maxScore}`;
        const timerSpan = card.querySelector('.timer-value');
        if (timerSpan && !group.finished) {
            if (gameActive && gameStartTimestamp) {
                const elapsed = Math.floor((Date.now() - gameStartTimestamp) / 1000);
                timerSpan.innerText = formatTime(elapsed);
            }
        }
        const questionDiv = card.querySelector('.question-text');
        if (questionDiv && group.currentProblem) {
            questionDiv.innerHTML = `${group.currentProblem.expression} = ? <span class="hint-icon">✨</span>`;
        }
        const trackDiv = card.querySelector('.track-vertical');
        const car = card.querySelector('.car-icon');
        if (trackDiv && car) {
            const trackHeight = trackDiv.clientHeight;
            let ratio = Math.min(1, group.score / maxScore);
            car.style.bottom = `${ratio * (trackHeight - 8)}px`;
        }
    }

    function refreshAllTimers() {
        if (!gameActive) return;
        groupsData.forEach((g, i) => {
            if (!g.finished) {
                const elapsed = Math.floor((Date.now() - gameStartTimestamp) / 1000);
                const card = document.getElementById(`track-${i}`);
                if (card) card.querySelector('.timer-value').innerText = formatTime(elapsed);
            }
            updateGroupUI(i);
        });
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        return `${m.toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }

    function handleSubmit(groupId) {
        const g = groupsData[groupId];
        if (!gameActive || !g || g.finished) return showErrorMsg();
        const input = document.querySelector(`#track-${groupId} .input-value`).innerText.trim();
        const ans = parseInt(input);
        if (isNaN(ans)) return showErrorMsg();

        if (ans === g.currentProblem.answer) {
            g.score++;
            if (g.score >= maxScore) {
                g.finished = true;
                g.finishTime = Math.floor((Date.now() - gameStartTimestamp) / 1000);
                checkAllFinished();
            } else {
                g.currentProblem = generateProblem();
                document.querySelector(`#track-${groupId} .input-value`).innerText = '';
            }
            updateGroupUI(groupId);
        } else showErrorMsg();
    }

    function appendDigit(gid, d) {
        if (!gameActive || groupsData[gid].finished) return;
        const span = document.querySelector(`#track-${gid} .input-value`);
        if (span.innerText.length < 5) span.innerText += d;
    }

    function deleteDigit(gid) {
        if (!gameActive || groupsData[gid].finished) return;
        const span = document.querySelector(`#track-${gid} .input-value`);
        span.innerText = span.innerText.slice(0, -1);
    }

    function checkAllFinished() {
        const allDone = groupsData.every(g => g.finished);
        if (allDone) {
            gameActive = false;
            clearInterval(timerInterval);
            const rank = groupsData.map((g,i)=>({i,name:g.name,t:g.finishTime})).sort((a,b)=>a.t-b.t);
            const medals = ['🥇冠军','🥈亚军','🥉季军'];
            rankingBoard.innerHTML = '🏆 最终排名 🏆 &nbsp;' + rank.slice(0,3).map((r,i)=>
                `<span style="background:#ffd780; padding:4px 10px; border-radius:20px">${medals[i]} ${r.name} ${formatTime(r.t)}</span>`
            ).join(' ');
        }
    }

    function buildTracks() {
        trackGrid.innerHTML = '';
        for(let i=0;i<groupCount;i++) {
            const name = `🚗 ${String.fromCharCode(65+i)}组`;
            const card = document.createElement('div');
            card.className = 'track-card';
            card.id = `track-${i}`;
            card.innerHTML = `
                <div class="track-vertical"><div class="car-icon">🏎️</div></div>
                <div class="player-info">
                    <span class="player-name">${name}</span>
                    <div class="score-time">
                        <span class="score">⭐ <span class="score-value">0/${maxScore}</span></span>
                        <span class="timer">⏱️ <span class="timer-value">00:00</span></span>
                    </div>
                </div>
                <div class="question-area"><div class="question-text">准备就绪</div></div>
                <div class="input-panel">
                    <div class="answer-input"><span class="input-value"></span></div>
                    <div class="numpad" id="numpad-${i}"></div>
                    <div class="action-btns"><button class="submit-btn">✔️ 确认</button></div>
                </div>`;
            trackGrid.appendChild(card);
            const pad = document.getElementById(`numpad-${i}`);
            '0123456789⌫'.split('').forEach(d=>{
                const btn = document.createElement('button');
                btn.innerText = d;
                btn.onclick = ()=> d==='⌫' ? deleteDigit(i) : appendDigit(i,d);
                pad.appendChild(btn);
            });
            card.querySelector('.submit-btn').onclick = ()=>handleSubmit(i);
        }
    }

    function resetAndStart() {
        clearInterval(timerInterval);
        gameActive = false;
        currentMode = modeSelect.value;
        groupCount = +groupSelect.value;
        maxScore = +maxScoreSelect.value;
        buildTracks();
        groupsData = Array.from({length:groupCount}, (_,i)=>({
            id:i, name:`${String.fromCharCode(65+i)}组`, score:0, finished:false,
            finishTime:0, currentProblem:generateProblem()
        }));
        groupsData.forEach((g,i)=>updateGroupUI(i));
        gameActive = true;
        gameStartTimestamp = Date.now();
        timerInterval = setInterval(refreshAllTimers, 500);
        rankingBoard.innerHTML = `🏎️ 已启动：${modeSelect.options[modeSelect.selectedIndex].text} 模式`;
    }

    startBtn.onclick = resetAndStart;
    (function init(){ modeSelect.value='add'; groupSelect.value='3'; maxScoreSelect.value='10'; resetAndStart(); })();
</script>
</body>
</html>
